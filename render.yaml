services:
  # ── Backend Web Service ──
  - type: web
    name: stockslab-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: "YOUR_SUPABASE_URL_HERE"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "YOUR_SERVICE_ROLE_KEY_HERE"
      - key: SUPABASE_ANON_KEY
        value: "YOUR_ANON_KEY_HERE"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://stockslab-app.onrender.com
      - key: ADMIN_URL
        value: https://stockslab-admin.onrender.com
      - key: REDIS_URL
        value: "YOUR_REDIS_URL_HERE"
      - key: SENTRY_DSN
        value: "YOUR_SENTRY_DSN_HERE"
      - key: ANGEL_ONE_API_KEY
        value: "YOUR_ANGEL_ONE_API_KEY_HERE"
      - key: ANGEL_ONE_API_SECRET
        value: "YOUR_ANGEL_ONE_API_SECRET_HERE"
      - key: ANGEL_ONE_CLIENT_CODE
        value: "YOUR_ANGEL_ONE_CLIENT_CODE_HERE"
      - key: ANGEL_ONE_PASSWORD
        value: "YOUR_ANGEL_ONE_PASSWORD_HERE"
      - key: ANGEL_ONE_TOTP_SECRET
        value: "YOUR_ANGEL_ONE_TOTP_SECRET_HERE"

  # ── Trader App (Static Site) ──
  - type: web
    name: stockslab-app
    runtime: static
    rootDir: apps/trader-app
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockslab-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://stockslab-backend.onrender.com/ws/prices
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin Panel (Static Site) ──
  - type: web
    name: stockslab-admin
    runtime: static
    rootDir: apps/admin-panel
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockslab-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Landing Page Website (Static Site) ──
  - type: web
    name: stockslab-landing
    runtime: static
    rootDir: apps/landing
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
