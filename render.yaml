services:
  # ── Backend Web Service ──
  - type: web
    name: stockslab-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: "https://nrwyqkannylqwqxigozn.supabase.co"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yd3lxa2FubnlscXdxeGlnb3puIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODA4NzA3NiwiZXhwIjoyMDkzNjYzMDc2fQ.nRCq0qb1mLQB0LcnVjU26EkZZLZmzWj8aDuxfFzpOlk"
      - key: SUPABASE_ANON_KEY
        value: "sb_publishable_LurXMNnUUffQ7Ca987yZdg_VDOaeRxq"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://stockslab-app.onrender.com
      - key: ADMIN_URL
        value: https://stockslab-admin.onrender.com
      - key: REDIS_URL
        value: "rediss://default:AVNS_g0bUjO18cC10kZn-k5e@valkey-31947b9e-stockslab.j.aivencloud.com:15432"
      - key: FINNHUB_API_KEY
        value: "d86lnn9r01qgiu45vci0d86lnn9r01qgiu45vcig"
      - key: SENTRY_DSN
        value: "your_sentry_dsn_url"

  # ── Trader App (Static Site) ──
  - type: web
    name: stockslab-app
    runtime: static
    rootDir: apps/trader-app
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockslab-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://stockslab-backend.onrender.com/ws/prices
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin Panel (Static Site) ──
  - type: web
    name: stockslab-admin
    runtime: static
    rootDir: apps/admin-panel
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockslab-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Landing Page Website (Static Site) ──
  - type: web
    name: stockslab-landing
    runtime: static
    rootDir: apps/landing
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockslab-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
